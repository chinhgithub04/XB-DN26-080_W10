apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-app
  namespace: payments
  labels:
    app: payments-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payments-app
  template:
    metadata:
      labels:
        app: payments-app
    spec:
      containers:
      - name: app
        image: python:3.11-slim
        command: ["python", "-m", "http.server", "8080"]
        ports:
        - containerPort: 8080
